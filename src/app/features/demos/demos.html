<section>

    <h2 class="text-3xl font-bold mb-10">
        Demos
    </h2>

    <div class="grid md:grid-cols-2 lg:grid-cols-3 gap-6">

        @for (demo of demos; track demo.title) {
        <div class="bg-card p-6 rounded-xl border border-gray-800 card-hover cursor-pointer" [routerLink]="demo.link"
            [class.opacity-50]="!demo.link" [class.cursor-not-allowed]="!demo.link">

            <h3 class="text-xl font-semibold text-primary">
                {{ demo.title }}
            </h3>

            <p class="mt-4 text-gray-400">
                {{ demo.description }}
            </p>

            <div class="mt-6 text-accent">
                {{ demo.link ? 'Try Demo →' : 'Coming Soon' }}
            </div>

        </div>
        }
    </div>

</section>
