<div class="max-w-xl">

    <h2 class="text-2xl font-bold mb-6">
        Dynamic Form Builder
    </h2>

    <form [formGroup]="form" (ngSubmit)="submit()">

        <div formArrayName="fields">

            @for (control of fields.controls; track $index; let i = $index) {
            <div class="flex gap-2 mb-4">

                <!-- <input [formControlName]="i" placeholder="Enter value" class="form-control flex-1 border border-gray-700"
                    [class.border-red-500]="fields.at(i).invalid && fields.at(i).touched" /> -->
                    <input
  [formControlName]="i"
  class="form-control flex-1 bg-card text-white border border-gray-700 focus:border-accent outline-none"
/>
                <button type="button" (click)="removeField(i)" class="px-3 bg-red-500 rounded">
                    X
                </button>

            </div>
            }

        </div>

        <button type="button" (click)="addField()" class="bg-primary px-4 py-2 rounded mr-2">
            Add Field
        </button>

        <button type="submit" class="bg-green-500 px-4 py-2 rounded">
            Submit
        </button>

    </form>

</div>
